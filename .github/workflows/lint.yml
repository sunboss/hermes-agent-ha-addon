name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n hermes_agent/run.sh

      - name: Python syntax check
        run: |
          python3 -m py_compile hermes_agent/hermes_ui/server.py
          python3 -m py_compile hermes_agent/hermes_ui/auth_bridge.py
          python3 -m py_compile hermes_agent/hermes_ui/provider_shim.py
          python3 -m py_compile hermes_agent/scripts/_fetch.py
          python3 -m py_compile hermes_agent/scripts/bake-version.py
          python3 -m py_compile hermes_agent/scripts/configure.py
          python3 -m py_compile hermes_agent/patches/ha_ws_url.py

      - name: YAML syntax check
        run: |
          python3 -c "
          import yaml, glob
          for f in glob.glob('hermes_agent/**/*.yaml', recursive=True) + glob.glob('hermes_agent/**/*.yml', recursive=True):
              yaml.safe_load(open(f))
              print('OK:', f)
          "

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: hermes_agent/Dockerfile
          ignore: DL3002,DL3003,DL3006,DL3008,DL3009,DL3059,DL4006,SC2016
