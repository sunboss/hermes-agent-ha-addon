configuration:
  llm_model:
    name: 代理模型
    description: "Hermes Agent 使用的模型 ID，默认 gpt-5.4（通过 ChatGPT 网页登录；在终端执行 `hermes auth login openai-codex` 完成授权）。必须使用支持工具调用的模型：GPT（gpt-5.4、gpt-4o、o3、o4-mini）、Claude（claude-opus-4-6、claude-sonnet-4-6）、Gemini（gemini-2.5-pro）、DeepSeek（deepseek-v3）或 Grok。"
  openrouter_api_key:
    name: OpenRouter API Key
    description: "可选。填入后使用 OpenRouter 作为推理服务商。"
  openai_base_url:
    name: OpenAI 兼容 Base URL
    description: "可选。OpenAI 或任何 OpenAI 兼容端点的基础 URL（如本地 Ollama、vLLM）。"
  openai_api_key:
    name: OpenAI 兼容 API Key
    description: "可选。上方端点的 API 密钥。"
  auth_mode:
    name: 认证模式
    description: "api_key — 使用上方填写的 API Key。web_login — 通过 ChatGPT 浏览器登录（首次启动后在终端执行 `hermes auth login openai-codex`）。"
  auth_storage_path:
    name: 认证存储路径
    description: "登录会话和令牌的持久化目录。一般无需修改。"
  terminal_backend:
    name: 终端后端
    description: "Hermes 执行 shell 命令的位置。使用内置 ttyd 终端请保持 local。"
  watch_domains:
    name: 监听域
    description: "Hermes 监听状态变化的 Home Assistant 实体域（如 light、switch、sensor）。"
  watch_entities:
    name: 监听实体
    description: "需要单独监听的具体实体（如 light.living_room）。"
  ignore_entities:
    name: 忽略实体
    description: "始终忽略的实体，即使其所属域在监听范围内。"
  watch_all:
    name: 监听所有实体
    description: "将所有 Home Assistant 状态变化转发给 Hermes。事件量大，建议保持关闭。"
  cooldown_seconds:
    name: 事件冷却时间（秒）
    description: "同一实体两次事件之间的最短间隔，防止事件风暴。"
  messaging_cwd:
    name: 工作目录
    description: "终端会话和代理文件操作的默认工作目录。"
  api_server_key:
    name: API 服务密钥
    description: "内置 Hermes API 服务器的认证密钥，留空则自动生成。"
