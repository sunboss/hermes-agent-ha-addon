configuration:
  llm_model:
    name: Agent Model
    description: "Agentic model ID. Defaults to gpt-5.4 (via the OpenAI Codex ChatGPT account login — run `hermes auth login openai-codex` inside the terminal). Hermes Agent REQUIRES tool-calling-capable models: GPT (gpt-5.4, gpt-4o, o3, o4-mini), Claude (claude-opus-4-6, claude-sonnet-4-6), Gemini (gemini-2.5-pro), DeepSeek (deepseek-v3), or Grok. Non-agentic models like NousResearch Hermes 3/4, Mistral base, or Llama base are rejected by the upstream gateway and should NOT be used here."
  huggingface_api_key:
    name: HuggingFace API Key
    description: "Optional. API key for the HuggingFace Inference API. Only useful when Hermes Agent adds tool-calling support for HF-hosted agentic models. Get yours at https://huggingface.co/settings/tokens."
  hf_base_url:
    name: HuggingFace Inference Base URL
    description: "OpenAI-compatible base URL for the HuggingFace Inference API. Default: https://api-inference.huggingface.co/v1. Change only for custom or self-hosted HuggingFace endpoints."
  openrouter_api_key:
    name: OpenRouter API Key
    description: Optional. Set this when using OpenRouter as the model provider.
  openai_base_url:
    name: OpenAI-Compatible Base URL
    description: Optional. Use this for OpenAI or self-hosted OpenAI-compatible endpoints.
  openai_api_key:
    name: OpenAI-Compatible API Key
    description: Optional. API key for the OpenAI-compatible endpoint.
  auth_mode:
    name: Authentication Mode
    description: Choose between direct API keys and the web-login bridge workflow.
  auth_provider:
    name: Web Login Provider
    description: Provider profile used when auth_mode is set to web_login.
  auth_storage_path:
    name: Auth Storage Path
    description: Directory used to persist auth sessions, bridge state, and login tokens.
  openai_oauth_client_id:
    name: OpenAI OAuth Client ID
    description: Required for OpenAI Codex web login mode. Leave empty when using API key mode.
  openai_oauth_redirect_uri:
    name: OpenAI OAuth Redirect URI
    description: Redirect URI used during the PKCE web login flow. The default matches OpenClaw's loopback callback flow.
  openai_oauth_scopes:
    name: OpenAI OAuth Scopes
    description: Space-separated scopes requested during OpenAI Codex web login.
  terminal_backend:
    name: Terminal Backend
    description: "Where Hermes should execute shell commands: local, docker, ssh, modal, daytona, or singularity."
  watch_domains:
    name: Watch Domains
    description: Home Assistant domains Hermes should watch for state changes.
  watch_entities:
    name: Watch Entities
    description: Specific Home Assistant entities Hermes should watch.
  ignore_entities:
    name: Ignore Entities
    description: Entities Hermes should always ignore.
  watch_all:
    name: Watch All Entities
    description: Forward all Home Assistant state changes to Hermes. Usually leave this disabled.
  cooldown_seconds:
    name: Event Cooldown Seconds
    description: Minimum seconds between repeated events for the same entity.
  messaging_cwd:
    name: Working Directory
    description: Default working directory for Hermes gateway sessions and local terminal execution.
  api_server_key:
    name: API Server Key
    description: Optional authentication key for the built-in Hermes API server that powers the ingress Web UI.
