configuration:
  llm_model:
    name: Agent Model
    description: "Model ID for the Hermes Agent. Defaults to gpt-5.4 (ChatGPT web login via `hermes auth login openai-codex` in the terminal). Requires tool-calling capable models: GPT (gpt-5.4, gpt-4o, o3, o4-mini), Claude (claude-opus-4-6, claude-sonnet-4-6), Gemini (gemini-2.5-pro), DeepSeek (deepseek-v3), or Grok."
  openrouter_api_key:
    name: OpenRouter API Key
    description: "Optional. Set this to use OpenRouter as the inference provider."
  openai_base_url:
    name: OpenAI-Compatible Base URL
    description: "Optional. Base URL for OpenAI or any OpenAI-compatible endpoint (e.g. local Ollama, vLLM)."
  openai_api_key:
    name: OpenAI-Compatible API Key
    description: "Optional. API key for the above endpoint."
  auth_mode:
    name: Authentication Mode
    description: "api_key — use API keys above. web_login — authenticate via ChatGPT browser login (run `hermes auth login openai-codex` in the terminal after first boot)."
  auth_storage_path:
    name: Auth Storage Path
    description: "Directory for persisting login sessions and auth tokens. Change only if you want to relocate auth data."
  terminal_backend:
    name: Terminal Backend
    description: "Where Hermes executes shell commands. Use 'local' for the built-in ttyd terminal."
  watch_domains:
    name: Watch Domains
    description: "Home Assistant entity domains Hermes should monitor for state changes (e.g. light, switch, sensor)."
  watch_entities:
    name: Watch Entities
    description: "Specific Home Assistant entities to monitor (e.g. light.living_room)."
  ignore_entities:
    name: Ignore Entities
    description: "Entities Hermes should always ignore, even if they match a watched domain."
  watch_all:
    name: Watch All Entities
    description: "Forward every Home Assistant state change to Hermes. Leave disabled unless you have a specific reason — high event volume."
  cooldown_seconds:
    name: Event Cooldown (seconds)
    description: "Minimum seconds between repeated events for the same entity. Prevents event storms."
  messaging_cwd:
    name: Working Directory
    description: "Default working directory for terminal sessions and agent file operations."
  api_server_key:
    name: API Server Key
    description: "Optional key for the built-in Hermes API server. Auto-generated if left empty."
