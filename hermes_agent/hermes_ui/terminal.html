<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>Hermes Terminal</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./terminal.css">
  </head>
  <body class="terminal-page">
    <div class="backdrop" aria-hidden="true">
      <div class="backdrop-orb orb-a"></div>
      <div class="backdrop-orb orb-b"></div>
      <div class="backdrop-grid"></div>
    </div>

    <div class="terminal-shell-page terminal-redirect-page">
      <header class="terminal-topbar">
        <div class="terminal-brand">
          <p class="eyebrow">Hermes Native Shell</p>
          <h1>正在进入命令行</h1>
          <p class="terminal-copy">
            页面会自动跳转到原生 ttyd 终端。如果没有自动跳转，请使用下方按钮手动打开。
          </p>
        </div>
        <div class="terminal-actions-row">
          <a class="ghost-button" href="./">返回控制台</a>
          <a class="send-button terminal-direct-link" href="./ttyd/">打开原生终端</a>
        </div>
      </header>
    </div>

    <script>
      window.location.replace("./ttyd/");
    </script>
  </body>
</html>
