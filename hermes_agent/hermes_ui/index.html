<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hermes Agent</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <div class="backdrop-orb orb-a"></div>
      <div class="backdrop-orb orb-b"></div>
      <div class="backdrop-grid"></div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-mark">H</div>
          <div>
            <p class="eyebrow">Home Assistant Ingress</p>
            <h1>Hermes Agent</h1>
          </div>
        </div>

        <p id="sidebar-copy" class="sidebar-copy"></p>

        <div class="status-grid">
          <article class="status-panel">
            <span id="label-gateway" class="micro-label"></span>
            <strong id="health-status" class="status-value">Checking...</strong>
          </article>
          <article class="status-panel">
            <span id="label-conversation" class="micro-label"></span>
            <strong id="conversation-id" class="status-value">pending</strong>
          </article>
          <article class="status-panel status-panel-wide">
            <span id="label-model" class="micro-label"></span>
            <strong id="model-name" class="status-value">Detecting...</strong>
          </article>
        </div>

        <section class="auth-panel" aria-label="Authentication status">
          <div class="auth-head">
            <div>
              <p id="label-auth" class="micro-label"></p>
              <h3 id="auth-title" class="auth-title"></h3>
            </div>
            <span id="auth-pill" class="auth-pill" data-state="checking"></span>
          </div>
          <p id="auth-copy" class="auth-copy"></p>
          <div class="auth-actions">
            <button id="auth-start" class="ghost-button" type="button"></button>
            <button id="auth-refresh" class="ghost-button" type="button"></button>
            <button id="auth-logout" class="ghost-button" type="button"></button>
          </div>
          <label id="auth-input-label" class="micro-label" for="auth-callback-input"></label>
          <textarea id="auth-callback-input" class="auth-textarea" name="auth-callback-input" rows="4"></textarea>
          <div class="auth-footer">
            <button id="auth-exchange" class="send-button auth-submit" type="button"></button>
            <p id="auth-helper" class="auth-helper"></p>
          </div>
        </section>

        <section class="prompt-bank" aria-label="Quick prompts">
          <p id="quick-prompts-label" class="micro-label"></p>
          <div class="prompt-list">
            <button id="prompt-0" class="prompt-chip" type="button"></button>
            <button id="prompt-1" class="prompt-chip" type="button"></button>
            <button id="prompt-2" class="prompt-chip" type="button"></button>
          </div>
        </section>

        <button id="reset-chat" class="reset-button" type="button"></button>
      </aside>

      <main class="main-stage">
        <header class="hero">
          <div class="hero-copy-block">
            <p id="hero-eyebrow" class="eyebrow"></p>
            <h2 id="hero-title"></h2>
            <p id="hero-copy" class="hero-copy"></p>
          </div>
          <div class="hero-meta">
            <div>
              <span id="session-feed-label" class="micro-label"></span>
              <strong id="message-count" class="hero-stat">0 turns</strong>
            </div>
            <p id="hero-note" class="hero-note"></p>
          </div>
        </header>

        <section class="transcript-shell" aria-label="Conversation transcript">
          <div class="transcript-head">
            <div>
              <p id="transcript-label" class="micro-label"></p>
              <h3 id="transcript-title"></h3>
            </div>
            <p id="transcript-hint" class="transcript-hint"></p>
          </div>

          <section id="chat-log" class="chat-log" aria-live="polite">
            <div id="empty-state" class="empty-state">
              <p id="empty-kicker" class="empty-kicker"></p>
              <p id="empty-title" class="empty-title"></p>
              <p id="empty-copy" class="empty-copy"></p>
            </div>
          </section>
        </section>

        <form id="chat-form" class="composer">
          <label id="input-label" class="micro-label" for="chat-input"></label>
          <textarea id="chat-input" name="chat-input" rows="4" required></textarea>
          <div class="composer-footer">
            <p id="error-message" class="error-message" hidden></p>
            <div class="composer-actions">
              <span id="composer-note" class="composer-note"></span>
              <button id="send-button" class="send-button" type="submit"></button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <template id="message-template">
      <article class="message">
        <div class="message-meta">
          <span class="message-role"></span>
        </div>
        <div class="message-body"></div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
