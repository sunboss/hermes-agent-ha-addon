name: "Hermes Agent"
description: "Home Assistant add-on for Hermes Agent with Ingress UI, dashboard proxy, and ttyd terminal."
version: "2026.4.24.5"
slug: "hermes_agent"
init: false
startup: "application"
stage: "stable"
homeassistant_api: true
ingress: true
ingress_stream: true
ingress_port: 8099
panel_title: "Hermes Agent"
panel_icon: "mdi:robot-excited-outline"
arch:
  - aarch64
  - amd64
url: "https://github.com/sunboss/hermes-agent-ha-addon"
map:
  - addon_config:rw
options:
  llm_model: "gpt-5.4"
  openrouter_api_key: ""
  openai_base_url: ""
  openai_api_key: ""
  auth_mode: "api_key"
  auth_storage_path: "/config/auth"
  terminal_backend: "local"
  watch_domains: []
  watch_entities: []
  ignore_entities: []
  watch_all: false
  cooldown_seconds: 30
  messaging_cwd: "/config/workspace"
  api_server_key: ""
schema:
  llm_model: "str?"
  openrouter_api_key: "password?"
  openai_base_url: "str?"
  openai_api_key: "password?"
  auth_mode: "list(api_key|web_login)"
  auth_storage_path: "str?"
  terminal_backend: "list(local|docker|ssh|modal|daytona|singularity)"
  watch_domains:
    - "str"
  watch_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  ignore_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  watch_all: "bool"
  cooldown_seconds: "int(0,3600)"
  messaging_cwd: "str?"
  api_server_key: "password?"
