name: "Hermes Agent"
description: "Wraps the official Hermes Agent image as a Home Assistant add-on with an ingress Web UI."
version: "0.5.0"
slug: "hermes_agent"
init: false
startup: "application"
homeassistant_api: true
ingress: true
ingress_port: 8099
arch:
  - aarch64
  - amd64
url: "https://github.com/sunboss/hermes-agent-ha-addon"
options:
  llm_model: ""
  openrouter_api_key: ""
  openai_base_url: ""
  openai_api_key: ""
  auth_mode: "api_key"
  auth_provider: "openai_web"
  auth_storage_path: "/data/auth"
  openai_oauth_client_id: ""
  openai_oauth_redirect_uri: "http://127.0.0.1:1455/auth/callback"
  openai_oauth_scopes: "openid profile email offline_access"
  terminal_backend: "local"
  watch_domains: []
  watch_entities: []
  ignore_entities: []
  watch_all: false
  cooldown_seconds: 30
  messaging_cwd: "/data/workspace"
  api_server_key: ""
schema:
  llm_model: "str?"
  openrouter_api_key: "password?"
  openai_base_url: "str?"
  openai_api_key: "password?"
  auth_mode: "list(api_key|web_login)"
  auth_provider: "list(openai_web|custom)"
  auth_storage_path: "str?"
  openai_oauth_client_id: "str?"
  openai_oauth_redirect_uri: "str?"
  openai_oauth_scopes: "str?"
  terminal_backend: "list(local|docker|ssh|modal|daytona|singularity)"
  watch_domains:
    - "str"
  watch_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  ignore_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  watch_all: "bool"
  cooldown_seconds: "int(0,3600)"
  messaging_cwd: "str?"
  api_server_key: "password?"
