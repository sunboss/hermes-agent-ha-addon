name: "Hermes Agent"
description: "Home Assistant add-on for Hermes Agent with Ingress UI, dashboard proxy, and ttyd terminal."
version: "0.10.3"
slug: "hermes_agent"
init: false
startup: "application"
stage: "stable"
homeassistant_api: true
ingress: true
ingress_stream: true
ingress_port: 8099
panel_title: "Hermes Agent"
panel_icon: "mdi:robot-excited-outline"
arch:
  - aarch64
  - amd64
url: "https://github.com/sunboss/hermes-agent-ha-addon"
map:
  - type: homeassistant_config
    read_only: false
    path: /config
options:
  llm_model: "gpt-5.4"
  openrouter_api_key: ""
  openai_base_url: ""
  openai_api_key: ""
  huggingface_api_key: ""
  hf_base_url: "https://api-inference.huggingface.co/v1"
  auth_mode: "api_key"
  auth_provider: "openai_web"
  auth_storage_path: "/config/addons_data/hermes-agent/addon-state/auth"
  openai_oauth_client_id: ""
  openai_oauth_redirect_uri: "http://127.0.0.1:1455/auth/callback"
  openai_oauth_scopes: "openid profile email offline_access"
  terminal_backend: "local"
  watch_domains: []
  watch_entities: []
  ignore_entities: []
  watch_all: false
  cooldown_seconds: 30
  messaging_cwd: "/config/addons_data/hermes-agent/workspace"
  api_server_key: ""
schema:
  llm_model: "str?"
  openrouter_api_key: "password?"
  openai_base_url: "str?"
  openai_api_key: "password?"
  huggingface_api_key: "password?"
  hf_base_url: "str?"
  auth_mode: "list(api_key|web_login)"
  auth_provider: "list(openai_web|custom)"
  auth_storage_path: "str?"
  openai_oauth_client_id: "str?"
  openai_oauth_redirect_uri: "str?"
  openai_oauth_scopes: "str?"
  terminal_backend: "list(local|docker|ssh|modal|daytona|singularity)"
  watch_domains:
    - "str"
  watch_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  ignore_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  watch_all: "bool"
  cooldown_seconds: "int(0,3600)"
  messaging_cwd: "str?"
  api_server_key: "password?"
