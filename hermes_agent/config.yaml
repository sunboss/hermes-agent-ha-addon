name: "Hermes Agent"
description: "Wraps the official Hermes Agent image as a Home Assistant add-on."
version: "0.1.0"
slug: "hermes_agent"
init: false
startup: "application"
homeassistant_api: true
arch:
  - aarch64
  - amd64
url: "https://github.com/sunboss/hermes-agent-ha-addon"
options:
  llm_model: ""
  openrouter_api_key: ""
  openai_base_url: ""
  openai_api_key: ""
  terminal_backend: "local"
  watch_domains: []
  watch_entities: []
  ignore_entities: []
  watch_all: false
  cooldown_seconds: 30
  messaging_cwd: "/data/workspace"
  api_server_enabled: false
  api_server_key: ""
schema:
  llm_model: "str?"
  openrouter_api_key: "password?"
  openai_base_url: "str?"
  openai_api_key: "password?"
  terminal_backend: "list(local|docker|ssh|modal|daytona|singularity)"
  watch_domains:
    - "str"
  watch_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  ignore_entities:
    - "match(^[a-z_][a-z0-9_]*\\.[a-z0-9_]+$)"
  watch_all: "bool"
  cooldown_seconds: "int(0,3600)"
  messaging_cwd: "str?"
  api_server_enabled: "bool"
  api_server_key: "password?"
